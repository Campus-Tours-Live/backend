spring.application.name=campustourslive-core

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/campustours}
spring.datasource.username=${DB_USERNAME:ctl}
spring.datasource.password=${DB_PASSWORD:ctl}
# Send String bind params as PG "unknown" so they coerce into the snake_case enum
# types (account_status, user_role, …). Lets us map enums as @Enumerated(STRING)
# without Hibernate emitting a cast to a class-derived type name that doesn't exist.
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# Throw (not silently 404-page) on unmapped routes so the handler returns a clean
# problem+json 404 instead of falling through to the generic 500 handler.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# --- JPA: Flyway owns the schema; Hibernate never alters it ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway (applies db/migration/V1__schema.sql, V2__seed_universities.sql) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Auth (Google Sign-In / OIDC) ---
# Google's OIDC issuer; its JWKS validates every request's id_token (signature,
# issuer, expiry). Fetched once at startup.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_ISSUER_URI:https://accounts.google.com}
# The Google OAuth Client ID. id_tokens must carry it in the "aud" claim — see
# AudienceValidator. Leave blank to skip audience checks (not recommended).
app.auth.audience=${GOOGLE_CLIENT_ID:}

server.port=${CORE_PORT:8080}

# --- Actuator (health/info + Kubernetes liveness/readiness probes) ---
# /actuator/health, /actuator/health/liveness, /actuator/health/readiness are
# permitted unauthenticated in SecurityConfig; details only shown when authorized.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
