name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-cover can diff against the base branch

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Unit + Testcontainers integration tests + JaCoCo 90% project gate.
      # Docker is preinstalled on ubuntu-latest, so Testcontainers works out of the box.
      - name: Build, test, coverage gate
        run: ./mvnw -B verify

      # Patch coverage: lines changed in this PR must be >= 80% covered.
      - name: Patch coverage (changed lines >= 80%)
        run: |
          python -m pip install --quiet diff-cover
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags --depth=1 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
          diff-cover target/site/jacoco/jacoco.xml \
            --compare-branch="origin/$BASE" \
            --src-roots src/main/java \
            --fail-under=80
